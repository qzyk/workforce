{% extends "base.html" %}
{% block title %}Raporteaza problema - Teren{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('teren.index') }}">Teren</a></li>
<li class="breadcrumb-item active">Problema</li>
{% endblock %}

{% block extra_css %}
<style>
.tr-wrap { max-width:560px; margin:0 auto; }
.tr-form { background:#fff; border:1px solid #E8E3D5; border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.tr-form h2 { margin:0 0 16px; font-size:1.2rem; color:#0B1426; }
.tr-g { margin-bottom:16px; }
.tr-g label { display:block; font-size:.82rem; font-weight:700; color:var(--gray-600); margin-bottom:6px; text-transform:uppercase; letter-spacing:.4px; }
.tr-g select, .tr-g input, .tr-g textarea { width:100%; padding:14px; font-size:1.05rem; border:1.5px solid #E0D9C7; border-radius:12px; background:#FCFAF5; -webkit-appearance:none; }
.tr-g select:focus, .tr-g input:focus, .tr-g textarea:focus { outline:none; border-color:#C9A961; background:#fff; }
.tr-sev { display:flex; gap:8px; }
.tr-sev label { flex:1; margin:0; cursor:pointer; }
.tr-sev label span { display:block; text-align:center; padding:12px 0; font-size:.92rem; font-weight:800; border:1.5px solid #E0D9C7; border-radius:12px; background:#FCFAF5; color:var(--gray-600); text-transform:none; letter-spacing:0; }
.tr-sev input { position:absolute; opacity:0; pointer-events:none; }
.tr-sev input:checked + span { border-color:#C9A961; background:linear-gradient(135deg,#E0BB6E,#C9A961); color:#0B1426; }
.tr-sub { width:100%; min-height:54px; font-size:1.1rem; font-weight:800; border:none; border-radius:12px; background:linear-gradient(135deg,#E0BB6E,#C9A961,#A8893D); color:#0B1426; cursor:pointer; margin-top:4px; }
.tr-sub:active { opacity:.9; }
</style>
{% endblock %}

{% block content %}
<div class="tr-wrap">
    <form class="tr-form" method="POST" action="{{ url_for('teren.problema') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <h2><i class="fa-solid fa-triangle-exclamation" style="color:#C9A961;"></i> Raporteaza problema</h2>

        <div class="tr-g">
            <label>Ce ai observat?</label>
            <input type="text" name="titlu" required maxlength="200" placeholder="ex: fisura in grinda ax B" autofocus>
        </div>

        <div class="tr-g">
            <label>Severitate</label>
            <div class="tr-sev">
                <label><input type="radio" name="severitate" value="mica"><span>Mica</span></label>
                <label><input type="radio" name="severitate" value="medie" checked><span>Medie</span></label>
                <label><input type="radio" name="severitate" value="mare"><span>Mare</span></label>
                <label><input type="radio" name="severitate" value="critica"><span>Critica</span></label>
            </div>
        </div>

        <div class="tr-g">
            <label>Santier (optional)</label>
            <select name="santier_id">
                <option value="">— fara santier —</option>
                {% for s in santiere %}
                <option value="{{ s.id }}">{{ s.nume }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="tr-g">
            <label>Detalii (optional)</label>
            <textarea name="descriere" rows="3" placeholder="unde anume, ce s-a intamplat, ce e necesar…"></textarea>
        </div>

        <button type="submit" class="tr-sub"><i class="fa-solid fa-paper-plane"></i> Trimite raportul</button>
    </form>
</div>
{% endblock %}
