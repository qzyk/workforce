[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
addopts = -v --tb=short
markers =
    unit: tests fast, no DB I/O (model properties, services pure)
    integration: tests via Flask test client + DB
    e2e: tests via Playwright (real browser)
    slow: tests > 1s (excluded by default in dev)
