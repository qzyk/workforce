# Edifico - stack per client (Faza 1): app + Postgres, in spatele proxy-ului Traefik.
# Porneste intai proxy-ul partajat (docker/proxy) + reteaua edifico-proxy.
# Vezi docker/README.md.
name: edifico-${CLIENT_SLUG:-client}

services:
  app:
    build: .
    image: edifico:latest
    restart: unless-stopped
    # Config via interpolare (din .env implicit sau --env-file clients/<slug>/.env).
    # Asa, provisioning-ul per client (Faza 2) doar schimba --env-file.
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-edifico}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-edifico}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NUME: ${ADMIN_NUME:-Admin}
      ADMIN_PRENUME: ${ADMIN_PRENUME:-Client}
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      MAPBOX_PUBLIC_TOKEN: ${MAPBOX_PUBLIC_TOKEN:-}
      MAPBOX_SECRET_TOKEN: ${MAPBOX_SECRET_TOKEN:-}
      PORT: ${PORT:-8000}
      WORKERS: ${WORKERS:-1}
      THREADS: ${THREADS:-8}
      # Scheduler-ul ruleaza in serviciul dedicat 'scheduler', nu in web.
      RUN_SCHEDULER: "0"
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENV: ${SENTRY_ENV:-production}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=edifico-proxy
      - traefik.http.routers.${CLIENT_SLUG:-client}.rule=Host(`${CLIENT_DOMAIN}`)
      - traefik.http.routers.${CLIENT_SLUG:-client}.entrypoints=websecure
      - traefik.http.routers.${CLIENT_SLUG:-client}.tls.certresolver=le
      - traefik.http.services.${CLIENT_SLUG:-client}.loadbalancer.server.port=8000

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edifico}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-edifico}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edifico} -d ${POSTGRES_DB:-edifico}"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Scheduler dedicat (Faza 3): ruleaza APScheduler intr-un singur loc, ca
  # web-ul sa poata scala WORKERS fara job-uri duplicate.
  scheduler:
    build: .
    image: edifico:latest
    restart: unless-stopped
    entrypoint: ["python", "scripts/run_scheduler.py"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-edifico}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-edifico}
      SECRET_KEY: ${SECRET_KEY}
      RUN_SCHEDULER: "1"
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENV: ${SENTRY_ENV:-production}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
  proxy:
    external: true
    name: edifico-proxy

volumes:
  uploads:
  pgdata:
